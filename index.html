<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Mundo Feliz :)</title>

<style>

/* ===== ESTILO KIDS 90s ===== */

body.kids{
background:#fffbe6 url("https://www.transparenttextures.com/patterns/stars.png");
font-family:"Comic Sans MS",cursive;
text-align:center;
color:black;
}

.blink{animation:blink 1s infinite}
@keyframes blink{50%{opacity:0}}

.box{
border:4px outset yellow;
padding:20px;
margin:20px;
background:white;
}

/* ===== HORROR ===== */

body.horror{
background:black;
color:#aa0000;
font-family:monospace;
}

.glitch{
animation:glitch 0.2s infinite
}

@keyframes glitch{
0%{transform:translate(0)}
50%{transform:translate(2px,-2px)}
}

/* ===== ARQUIVOS ===== */

.file{
cursor:pointer;
margin:5px;
}

.hidden{
color:#040000;
}

/* ===== VHS ===== */

.vhs{
animation:vhs 0.15s infinite
}

@keyframes vhs{
0%{filter:contrast(1)}
50%{filter:contrast(1.4)}
}

</style>
</head>

<body class="kids">

<div id="app"></div>

<script>

/* =========================
ESTADO
========================= */

let state="kids"

/* =========================
AUDIOS
========================= */

const kidsMusic = new Audio("https://www.bensound.com/bensound-music/bensound-funnysong.mp3")
kidsMusic.loop=true

const horrorMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3")
horrorMusic.loop=true
horrorMusic.volume=0.05

document.body.onclick=()=>kidsMusic.play().catch(()=>{})

/* =========================
PÁGINAS
========================= */

const pages={

kids:`
<h1>🌈 MUNDO FELIZ 🌈</h1>

<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" width=120>

<p class="blink">✨ NOVO!!! ✨</p>

<div class="box">

<h2>Jogos</h2>

<div class="file" onclick="goto('videos')">📁 vídeos</div>
<div class="file" onclick="goto('downloads')">📁 downloads</div>

</div>

`,

videos:`

<h1>VÍDEOS DIVERTIDOS</h1>

<iframe width=400 height=200 src="https://www.youtube.com/embed/7gRjoH7pwOQ"></iframe>

<br><br>

<button onclick="goto('kids')">voltar</button>

`,

downloads:`

<h1>DOWNLOADS</h1>

<div class="file" onclick="goto('arquivo001')">arquivo_001.exe</div>
<div class="file" onclick="goto('arquivo002')">arquivo_002.exe</div>

<br><br>

<button onclick="goto('kids')">voltar</button>

`,

/* ===== arquivos falsos ===== */

arquivo001:`

<h1>abrindo arquivo...</h1>

<p>nada encontrado</p>

<button onclick="goto('downloads')">voltar</button>

`,

arquivo002:`

<h1>abrindo arquivo...</h1>

<p class="hidden">ele ainda está aqui</p>

<button onclick="goto('downloads')">voltar</button>

`,

/* ===== rota horror ===== */

seeyoulater:`

<h1 class="glitch">você não devia ter vindo</h1>

<p>este arquivo não é seu</p>

<div class="file" onclick="goto('log1')">log_001</div>
<div class="file" onclick="goto('log2')">log_002</div>

`,

log1:`

<h1>registro corrompido</h1>

<p>██████████████</p>

<button onclick="goto('seeyoulater')">voltar</button>

`,

log2:`

<h1>registro</h1>

<p>ele está olhando</p>

<button onclick="goto('seeyoulater')">voltar</button>

`,

/* ===== final ===== */

final:`

<h1 class="glitch">acabou</h1>

<p>você abriu todos os arquivos</p>

`

}

/* =========================
ROTEADOR
========================= */

function goto(page){

location.hash=page

}

function render(){

let hash=location.hash.replace("#","")

if(hash==="")hash="kids"

/* ativa horror */

if(hash==="seeyoulater"||hash==="log1"||hash==="log2"||hash==="final"){

document.body.className="horror"
kidsMusic.pause()
horrorMusic.play().catch(()=>{})

}

/* render */

if(pages[hash]){

document.getElementById("app").innerHTML=pages[hash]

}

}

/* =========================
EVENTOS
========================= */

window.addEventListener("hashchange",render)
window.addEventListener("load",render)

/* =========================
SEGREDOS
========================= */

/* rota secreta digitando */

let secret="help"
let buffer=""

document.addEventListener("keydown",e=>{

buffer+=e.key

if(buffer.includes(secret)){

goto("seeyoulater")

}

})

/* título creepy */

setInterval(()=>{

if(document.body.className==="horror"){

document.title=Math.random()>0.5
?"não olhe atrás"
:"ele está perto"

}

},2000)

/* mensagem tardia */

setTimeout(()=>{

if(document.body.className==="horror"){

alert("rastreamento iniciado")

}

},15000)

</script>

</body>
</html>
