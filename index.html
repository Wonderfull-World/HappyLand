<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mundo Feliz! :)</title>

<style>
body{margin:0}

/* ===== KIDS RETRO ===== */
body.kids{
  background:#fffbe6 url('https://www.transparenttextures.com/patterns/stars.png');
  font-family:"Comic Sans MS",cursive;
  cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym46.cur'), auto;
}

.blink{animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}

.box{
  border:4px outset #ffcc00;
  padding:15px;
  margin:15px;
  background:white;
}

h1{
  color:red;
  text-shadow:2px 2px yellow;
}

.marquee{
  background:orange;
  color:white;
  padding:5px;
  font-weight:bold;
}

iframe{width:100%;height:150px;border:none}

/* ===== HORROR ===== */
body.horror{
  background:#000;
  color:#aa0000;
  font-family:monospace;
}

.corrupt{
  animation:glitch 0.3s infinite;
}

@keyframes glitch{
  0%{transform:translate(0)}
  25%{transform:translate(-1px,1px)}
  50%{transform:translate(1px,-1px)}
  75%{transform:translate(-1px,-1px)}
}

.hidden-msg{
  color:#050000;
}

</style>
</head>

<body class="kids">

<!-- ===== KIDS ===== -->
<div id="kids">

<center>
<h1>🌈 MUNDO FELIZ 🌈</h1>

<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" width="100">

<div class="marquee">
✨ BEM VINDO!!! JOGOS!!! VIDEOS!!! DIVIRTA-SE!!! ✨
</div>

<p class="blink">🔥 NOVO CONTEÚDO!!! 🔥</p>
</center>

<div class="box">
<h2>🎬 Vídeos</h2>

<iframe src="https://www.youtube.com/embed/7gRjoH7pwOQ"></iframe>
<iframe src="https://www.youtube.com/embed/YrWmoJs_v1g"></iframe>

</div>

<div class="box">
<h2>🎮 Jogo</h2>
<button onclick="alert('Você ganhou!!! :D')">CLIQUE PRA GANHAR</button>
</div>

<div class="box">
<h2>⭐ Sobre</h2>
<p>Site divertido!!! :D</p>
</div>

</div>

<!-- ===== HORROR ===== -->
<div id="horror" style="display:none">

<h1 class="corrupt">você não devia ter vindo</h1>

<p>este arquivo não foi feito para você</p>

<p class="hidden-msg">ele ainda está aqui</p>

<div>
<h2>arquivo_001</h2>
<iframe src="https://www.youtube.com/embed/7gRjoH7pwOQ"></iframe>
</div>

<div>
<h2>arquivo_002</h2>
<iframe src="https://www.youtube.com/embed/YrWmoJs_v1g"></iframe>
</div>

<div id="secret" style="display:none">
<h2>arquivo_004</h2>
<p>██████████</p>
</div>

</div>

<script>

/* ===== TROCA DE MODO ===== */
if(location.hash === "#seeyoulater"){
  document.body.className="horror";
  document.getElementById("kids").style.display="none";
  document.getElementById("horror").style.display="block";
}

/* ===== EVENTOS SECRETOS ===== */
let clicks=0;

document.body.addEventListener("click",()=>{
  clicks++;

  if(clicks===15){
    alert("não continue.");
  }

  if(clicks===30){
    document.body.innerHTML="<h1 style='color:red;text-align:center'>VOCÊ VIU DEMAIS</h1>";
  }
});

/* ===== TÍTULO MALUCO ===== */
setInterval(()=>{
  if(document.body.className==="horror"){
    document.title=Math.random()>0.5?"não olhe atrás":"ele está perto";
  }
},2000);

/* ===== EVENTO TEMPO ===== */
setTimeout(()=>{
  if(document.body.className==="horror"){
    alert("erro: usuário detectado");
  }
},15000);

/* ===== SEGREDO URL ===== */
if(location.hash === "#arquivo4"){
  document.getElementById("secret").style.display="block";
}

/* ===== SOM AMBIENTE ===== */
let audio=new Audio();
audio.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
audio.volume=0.03;
audio.loop=true;

setTimeout(()=>audio.play(),3000);

</script>

</body>
</html>
