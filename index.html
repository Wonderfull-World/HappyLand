<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mundo Feliz :)</title>

<style>

/* ===== KIDS RETRO ===== */
body.kids{
  background:#fffbe6 url('https://www.transparenttextures.com/patterns/stars.png');
  font-family:"Comic Sans MS",cursive;
  text-align:center;
}

.blink{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0}}

.box{
  border:4px outset #ffcc00;
  margin:20px;
  padding:15px;
  background:white;
}

/* ===== HORROR ===== */
body.horror{
  background:#000;
  color:#aa0000;
  font-family:monospace;
}

.corrupt{
  animation:glitch 0.3s infinite;
}

@keyframes glitch{
  0%{transform:translate(0)}
  50%{transform:translate(2px,-2px)}
}

.hidden{color:#050000}

iframe{width:100%;height:200px;border:none}

</style>
</head>

<body class="kids">

<!-- ===== KIDS ===== -->
<div id="kids">

<h1>🌈 MUNDO FELIZ 🌈</h1>

<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" width="120">

<p class="blink">✨ NOVO!!! ✨</p>

<div class="box">
<h2>Vídeos</h2>
<iframe src="https://www.youtube.com/embed/7gRjoH7pwOQ"></iframe>
<iframe src="https://www.youtube.com/embed/YrWmoJs_v1g"></iframe>
</div>

<div class="box">
<button onclick="alert('Você ganhou!!!')">CLIQUE PRA GANHAR</button>
</div>

</div>

<!-- ===== HORROR ===== -->
<div id="horror" style="display:none">

<h1 class="corrupt">você não devia ter vindo</h1>

<p>este arquivo não é seu</p>

<p class="hidden">ele ainda está aqui</p>

<div>
<h2>arquivo_001</h2>
<iframe src="https://www.youtube.com/embed/7gRjoH7pwOQ"></iframe>
</div>

<div>
<h2>arquivo_002</h2>
<iframe src="https://www.youtube.com/embed/YrWmoJs_v1g"></iframe>
</div>

<div id="secret" style="display:none">
<h2>arquivo_004</h2>
<p>██████████</p>
</div>

</div>

<script>

/* ===== AUDIO ===== */
let kidsMusic = new Audio("https://www.bensound.com/bensound-music/bensound-funnysong.mp3");
kidsMusic.loop = true;
kidsMusic.volume = 0.3;

let horrorMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3");
horrorMusic.loop = true;
horrorMusic.volume = 0.05;

let secretSound = new Audio("https://www.soundjay.com/horror/sounds/horror-ambience-01.mp3");

/* autoplay */
document.body.addEventListener("click",()=>{
  kidsMusic.play().catch(()=>{});
},{once:true});

/* ===== ROUTER ===== */
function route(){
  let h = location.hash;

  /* reset */
  document.body.className="kids";
  kids.style.display="block";
  horror.style.display="none";

  horrorMusic.pause();
  kidsMusic.play().catch(()=>{});

  /* HORROR */
  if(h === "#seeyoulater"){
    setHorror();
  }

  if(h === "#arquivo4"){
    setHorror();
    document.getElementById("secret").style.display="block";
    secretSound.play();
  }

  if(h === "#help"){
    setHorror();
    document.body.innerHTML="<h1 style='color:red'>me ajude</h1>";
    secretSound.play();
  }

  if(h === "#final"){
    setHorror();
    document.body.innerHTML="<h1 style='color:red'>acabou</h1>";
    new Audio("https://www.soundjay.com/horror/sounds/scream-01.mp3").play();
  }

  if(h === "#loop"){
    setHorror();
    setInterval(()=>{
      document.body.style.transform=`translate(${Math.random()*10}px,${Math.random()*10}px)`
    },100);
  }

  if(h === "#observer"){
    setHorror();
    setInterval(()=>document.title="eu estou olhando",500);
    secretSound.play();
  }
}

function setHorror(){
  document.body.className="horror";
  kids.style.display="none";
  horror.style.display="block";

  kidsMusic.pause();
  horrorMusic.play().catch(()=>{});
}

/* eventos */
window.addEventListener("load",route);
window.addEventListener("hashchange",route);

/* clicks secretos */
let c=0;
document.body.addEventListener("click",()=>{
  c++;
  if(c==20) alert("pare.");
  if(c==40) document.body.innerHTML="<h1 style='color:red'>VOCÊ NÃO SAI MAIS</h1>";
});

/* tempo */
setTimeout(()=>{
  if(document.body.className==="horror"){
    alert("rastreamento iniciado");
  }
},15000);

/* título */
setInterval(()=>{
  if(document.body.className==="horror"){
    document.title=Math.random()>0.5?"não olhe atrás":"ele está perto";
  }
},2000);

</script>

</body>
</html>
